# =============================================================================
# logrotate — rotation des logs fichier produits par le bot (hors stdout/stderr
# Docker, qui sont déjà gérés par le driver json-file avec max-size=10m/max-file=5
# dans docker-compose.yml).
#
# Installation sur le VPS :
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/openclaw-trading-bot
#   sudo chmod 644 /etc/logrotate.d/openclaw-trading-bot
#   sudo logrotate -d /etc/logrotate.d/openclaw-trading-bot   # dry-run
#   sudo logrotate    /etc/logrotate.d/openclaw-trading-bot   # force run
#
# IMPORTANT — chemin :
#   QUICKSTART recommande `/opt/openclaw-trading-bot/` — adapter si votre
#   `git clone` est ailleurs. Le container écrit dans /app/data/logs qui est
#   bind-monté depuis ./data/logs côté host.
#
# Couvre notamment :
#   - data/logs/YYYY-MM-DD.log.jsonl  (logs applicatifs structurés)
#   - data/logs/auto-update.log       (sorties du timer systemd)
#
# IMPORTANT — UID/GID :
#   `su 10001 10001` correspond à l'utilisateur `bot` défini dans le Dockerfile.
#   Sans ça, logrotate (qui tourne en root) créerait des fichiers que le
#   container (non-root UID 10001) ne pourrait plus ouvrir en écriture.
#
# IMPORTANT — copytruncate :
#   Le bot garde les file handlers ouverts (logging Python). `copytruncate`
#   copie puis tronque le fichier en place au lieu de le renommer, ce qui
#   évite d'avoir à signaler le process pour qu'il rouvre ses handlers.
#   Conséquence : micro-fenêtre où des writes peuvent être perdus entre le
#   `cp` et le `truncate` — acceptable pour des logs applicatifs non-financiers.
# =============================================================================

/opt/openclaw-trading-bot/data/logs/*.log /opt/openclaw-trading-bot/data/logs/*.jsonl {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su 10001 10001
    create 0640 10001 10001
}
